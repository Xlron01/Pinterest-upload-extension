<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=450">
  <title>PinFlow</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">PinFlow</h1>
      <span class="version">v1.1.0</span>
    </header>

    <section id="active-profile-section" class="section">
      <label class="section-label" for="active-profile">Active Profile</label>
      <select id="active-profile" class="select-input">
        <option value="">No profile selected</option>
      </select>
    </section>

    <section id="scrape-section" class="section">
      <button class="btn btn-primary btn-full" id="scrape-btn">Capture Images from Page</button>
      <div id="image-grid" class="image-grid" style="display:none;"></div>
      <div id="selection-bar" class="selection-bar" style="display:none;">
        <span id="selection-count">0 selected</span>
        <button class="btn btn-primary btn-small" id="add-selected-btn">Add to Queue (max 25)</button>
        <button class="btn btn-secondary btn-small" id="select-all-btn">Select All</button>
        <button class="btn btn-secondary btn-small" id="deselect-all-btn">Clear</button>
      </div>
    </section>

    <section id="profile-form-section" class="section">
      <h2 class="section-title" id="form-toggle">
        <span id="form-title">New Profile</span>
        <span id="form-arrow" class="arrow">&#9660;</span>
      </h2>
      <form id="profile-form" class="form" style="display:none;">
        <input type="hidden" id="profile-id">
        <div class="field">
          <label for="profile-name">Name</label>
          <input type="text" id="profile-name" maxlength="50" placeholder="e.g. Design Posts" required>
          <span class="field-error" id="name-error"></span>
        </div>
        <div class="field">
          <label for="profile-description">Description</label>
          <textarea id="profile-description" maxlength="500" rows="3" placeholder="Pin description text..."></textarea>
          <span class="char-count"><span id="desc-count">0</span>/500</span>
          <span class="field-error" id="desc-error"></span>
        </div>
        <div class="field">
          <label for="profile-hashtags">Hashtags</label>
          <input type="text" id="profile-hashtags" placeholder="design, ui, creative">
          <span class="hint">Comma separated, Pinterest topics only (no #), max 20</span>
          <span class="field-error" id="tags-error"></span>
        </div>
        <div class="field">
          <label for="profile-website">Website URL</label>
          <input type="url" id="profile-website" placeholder="https://example.com">
          <span class="field-error" id="url-error"></span>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="save-btn">Save Profile</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn" style="display:none">Cancel</button>
        </div>
      </form>
    </section>

    <section id="profile-list-section" class="section">
      <h2 class="section-title">Profiles</h2>
      <div id="profile-list" class="profile-list">
        <p class="empty-state">No profiles yet. Create one above.</p>
      </div>
    </section>

    <section id="queue-section" class="section" style="display:none;">
      <h2 class="section-title">Pin Queue <span id="queue-count" class="badge">0</span></h2>
      <p class="queue-hint" id="queue-hint">Images will be published one by one in the background. You can close this popup.</p>
      <div id="queue-list" class="queue-list"></div>
      <div class="queue-actions">
        <button class="btn btn-primary btn-full" id="run-queue-btn" disabled>Publish Queue Now</button>
        <button class="btn btn-danger btn-full" id="clear-queue-btn" style="display:none;">Clear Queue</button>
      </div>
      <div id="queue-progress" class="progress-bar" style="display:none;">
        <div id="queue-progress-fill" class="progress-fill" style="width:0%"></div>
      </div>
    </section>

    <section id="settings-section" class="section collapsible">
      <h2 class="section-title" id="settings-toggle">
        Settings
        <span id="settings-arrow" class="arrow">&#9654;</span>
      </h2>
      <div id="settings-body" class="collapsible-body" style="display:none">
        <div class="field">
          <label for="remote-config-url">Remote Config URL</label>
          <input type="url" id="remote-config-url" class="input-full" placeholder="https://gist.githubusercontent.com/...">
        </div>
        <label class="toggle-row">
          <span>Show toast notifications</span>
          <input type="checkbox" id="setting-show-toasts" checked>
        </label>
        <div class="sync-row">
          <span id="sync-status">Never synced</span>
          <button class="btn btn-small" id="force-sync-btn">Force Sync</button>
        </div>
      </div>
    </section>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
